<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laura's Rabbit Hole</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Fredoka', sans-serif;
    min-height: 100vh;
    /* Sparkly pink sky with a soft glow at the top */
    background: radial-gradient(circle at 50% 0%, #ffd6f2 0%, #ffaede 35%, #f87fcb 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Twinkling stars layer sits behind everything */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    color: #fff;
    opacity: 0.85;
    animation: twinkle 2.5s infinite ease-in-out;
    text-shadow: 0 0 6px #fff, 0 0 12px #ffe9fb;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50%      { opacity: 1;   transform: scale(1.2); }
  }

  h1 {
    position: relative;
    z-index: 1;
    margin: 28px 20px 6px;
    text-align: center;
    font-size: clamp(2rem, 6vw, 3.6rem);
    font-weight: 700;
    color: #fff;
    /* Candy outline so the bubbly text pops on the pink */
    text-shadow:
      2px 2px 0 #d63ba3,
      -2px 2px 0 #d63ba3,
      2px -2px 0 #d63ba3,
      -2px -2px 0 #d63ba3,
      4px 6px 10px rgba(118, 20, 86, 0.4);
  }
  .subtitle {
    position: relative;
    z-index: 1;
    color: #fff;
    font-size: clamp(1rem, 3vw, 1.4rem);
    text-shadow: 1px 1px 0 #d63ba3;
    margin-bottom: 6px;
    text-align: center;
  }

  /* Sign container keeps the image's aspect ratio so the
     percentage-based click areas always line up */
  .sign-wrap {
    position: relative;
    z-index: 1;
    width: min(420px, 88vw);
    aspect-ratio: 907 / 1024;
    margin: 4px auto 40px;
  }
  .sign-wrap img {
    width: 100%;
    height: 100%;
    display: block;
    filter: drop-shadow(0 10px 18px rgba(120, 20, 90, 0.35));
  }

  /* Invisible clickable hotspots over each sign */
  .hotspot {
    position: absolute;
    cursor: pointer;
    border: none;
    background: transparent;
    padding: 0;
    transition: transform 0.15s ease, filter 0.15s ease;
  }
  .hotspot:hover, .hotspot:focus-visible {
    transform: scale(1.06);
    filter: drop-shadow(0 0 10px #fff);
    outline: none;
  }

  /* Travel map arrow (top) */
  .hs-map    { left: 5%;  top: 13%; width: 80%; height: 17%; }
  /* Color Sudoku arrow (middle) */
  .hs-sudoku { left: 5%;  top: 34%; width: 83%; height: 16%; }
  /* Don't click here sign (bottom) */
  .hs-danger { left: 32%; top: 53%; width: 30%; height: 19%; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(80, 10, 60, 0.7);
    backdrop-filter: blur(3px);
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    position: relative;
    background: #fff;
    border: 6px solid #f87fcb;
    border-radius: 22px;
    padding: 16px;
    max-width: 90vw;
    max-height: 88vh;
    box-shadow: 0 14px 40px rgba(0,0,0,0.4);
    animation: pop 0.25s ease;
  }
  @keyframes pop {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .modal-box img {
    display: block;
    max-width: 100%;
    max-height: 76vh;
    border-radius: 12px;
  }
  .modal-title {
    text-align: center;
    color: #d63ba3;
    font-size: 1.4rem;
    margin-bottom: 10px;
  }
  .modal-close {
    position: absolute;
    top: -18px;
    right: -18px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 4px solid #fff;
    background: #f87fcb;
    color: #fff;
    font-size: 1.4rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    line-height: 1;
  }
  .modal-close:hover { background: #d63ba3; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<h1>🐰 Welcome to Laura's Rabbit Hole! 🐰</h1>
<p class="subtitle">Hop around and pick a sign ✨</p>

<div class="sign-wrap">
  <img src="img/roadsign_final.png" alt="Signpost with Laura's projects">

  <a class="hotspot hs-map" href="https://laura.proost.science/country-map/"
     aria-label="Travel map"></a>

  <a class="hotspot hs-sudoku" href="https://laura.proost.science/color-sudoku/"
     aria-label="Color Sudoku"></a>

  <button class="hotspot hs-danger" id="dangerBtn" aria-label="Don't click here"></button>
</div>

<div class="modal-overlay" id="dangerModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal" aria-label="Close">✕</button>
    <div class="modal-title">You were warned! 😱</div>
    <img src="img/danger.jpg" alt="Danger">
  </div>
</div>

<script>
  // Scatter twinkling stars across the background
  const starsLayer = document.getElementById('stars');
  const starGlyphs = ['✦', '✧', '⭐', '✨', '🌟'];
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('span');
    s.className = 'star';
    s.textContent = starGlyphs[Math.floor(Math.random() * starGlyphs.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.fontSize = (10 + Math.random() * 22) + 'px';
    s.style.animationDelay = (Math.random() * 2.5) + 's';
    starsLayer.appendChild(s);
  }

  // Danger sign opens the warning modal
  const modal = document.getElementById('dangerModal');
  document.getElementById('dangerBtn').addEventListener('click', () => modal.classList.add('open'));

  // Close on X, on overlay click, or with Escape
  function closeModal() { modal.classList.remove('open'); }
  document.getElementById('closeModal').addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
